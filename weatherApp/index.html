<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
</head>
<body>

    <img src="image/sky.jpg" class="w-100 h-100 position-absolute top-0 start-0 object-fit-cover" alt="">

    <div class="card rounded-3 position-relative z-1 text-white">
        <div class="search mb-4">
            <input type="text" placeholder="Enter city name" class="form-control" id="cityname">
            <button id="btn"><i class="bi bi-search"></i></button>
        </div>

        <div class="weather text-center">
            <i class="bi bi-cloud-rain display-3"></i>
            <h1 class="temp">22°c</h1>
            <h2 class="city">New York</h2>
            <div class="details ">
                <div class="col">
                    <div>
                        <i class="bi bi-droplet fs-1"></i>
                        <p class="humidity fs-4">50%</p>
                        <p class="fs-4">Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <div>
                        <i class="bi bi-wind fs-1"></i>
                        <p class="wind fs-4">15 km/h</p>
                        <p class="fs-4">Wind</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
    
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
</body>
</html>
