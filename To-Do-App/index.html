<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen flex justify-center items-center">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-96">

        <h1 class="text-2xl font-bold text-center mb-6 text-gray-700">
            My To-Do App
        </h1>

        <div class="flex gap-2 mb-4">
            <input 
                id="taskInput"
                type="text"
                placeholder="Enter task"
                class="flex-1 border p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
            >

            <button 
                onclick="addTask()"
                class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">
                Add
            </button>
        </div>

        <ul id="taskList" class="space-y-2"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
