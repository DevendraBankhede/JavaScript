<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100 min-h-screen">

    <form autocomplete="off" class="bg-white/90 backrop-blur rounded-2xl p-8 mb-12 w-full max-w-lg mx-auto">
           <h2 class="text-3xl font-bold mb-6 text-center text-blue-700 tracking-tingh">Add Users</h2>     

    <div class="mb-5">
        <label class="block text-gray-700 font-medium mb-2" for="name">Name</label>
        <input class="w-full px-4 py-2 border border-blue-200 rounded-lg focus:outline-none font-bold" type="text"
        id="name" name="name" required>
    </div>

    <div class="mb-5">
        <label class="block text-gray-700 font-medium mb-2" for="role">Role</label>
        <input class="w-full px-4 py-2 border border-blue-200 rounded-lg focus:outline-none font-bold" type="text"
        id="role" name="role" required>
    </div> 

    <div class="mb-5">
        <label class="block text-gray-700 font-medium mb-2" for="bio">Bio</label>
        <textarea class="w-full px-4 py-2 border border-blue-200 rounded-lg focus:outline-none font-bold" type="text"
        id="bio" name="bio" rows="3" required></textarea>
    </div>

    <div class="mb-5">
        <label class="block text-gray-700 font-medium mb-2" for="photo">Photo</label>
        <input class="w-full px-4 py-2 border border-blue-200 rounded-lg focus:outline-none font-bold" type="url"
        id="photo" name="photo" rows="3" required>
    </div>

    <button class="w-full bg-gradient-to-br from-blue-500 to-purple-500 text-white" type="submit">Submit</button>
    
    </form>
    <script src="script.js"></script>
</body>
</html>
