    <style>
      #main {
        padding: 30px;
        width: 100%;
        height: 100%;
        /* background-color: #222; */
      }
      input {
        display: block;
      }
      .card {
        max-width: 300px;
        column-rule: #555;
        border-radius: 10px;
        margin-top: 40px;
        padding: 20px;
        border: solid #e3e3e3;
        display: inline-block;
      }
      .profile {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        margin-bottom: 7px;
        overflow: hidden;
      }
      .profile img{
        width: 100px;
        height: 100px;
        object-fit: cover;
      }
      .card h5 {
        margin-top: 5px;
      }
      .card p {
        font-size: 12px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <form action="">
        <input type="text" placeholder="profile-pic" />
        <input type="text" placeholder="name" />
        <input type="text" placeholder="occupation" />
        <input type="text" placeholder="info" />
        <input type="submit" />
      </form>
